<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Lodówki AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      padding: 16px;
      background: #2c3e50;
      color: white;
      text-align: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.4;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #3498db;
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: white;
      color: black;
    }

    .system {
      align-self: center;
      background: #eee;
      color: #444;
      font-size: 14px;
    }

    #inputBar {
      display: flex;
      padding: 10px;
      gap: 8px;
      background: white;
      border-top: 1px solid #ddd;
      position: sticky;
      bottom: 0;
    }

    #textInput {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      min-width: 0;
    }

    button {
      font-size: 16px;
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      flex-shrink: 0;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #sendBtn {
      background: #2ecc71;
    }

    #micBtn {
      background: #e67e22;
    }
  </style>
</head>

<body>
  <header>Lodówki AI</header>

  <div id="chat">
    <div class="message bot">Witaj. Powiedz co chcesz zrobić.</div>
  </div>

  <div id="inputBar">
    <button id="micBtn" type="button">🎤</button>
    <input id="textInput" type="text" placeholder="Napisz wiadomość..." />
    <button id="sendBtn" type="button">Wyślij</button>
  </div>

  <script>
    const WEBHOOK_URL = 'https://primary-production-fb3d1.up.railway.app/webhook/ea0f0408-3c60-4580-bb5c-bd138cb2ad8b';

    const chat = document.getElementById('chat');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');

    let sessionId = localStorage.getItem('lodowka_session_id');
    if (!sessionId) {
      sessionId = 'session-' + crypto.randomUUID();
      localStorage.setItem('lodowka_session_id', sessionId);
    }

    function addMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function setSendingState(isSending) {
      sendBtn.disabled = isSending;
      textInput.disabled = isSending;
    }

    async function sendMessage() {
      const text = textInput.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      textInput.value = '';
      setSendingState(true);
      addMessage('Przetwarzam...', 'system');

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            session_id: sessionId,
            message_type: 'text',
            message: text
          })
        });

        const systemMessages = chat.querySelectorAll('.system');
        if (systemMessages.length > 0) {
          systemMessages[systemMessages.length - 1].remove();
        }

        if (!response.ok) {
          throw new Error('Błąd HTTP: ' + response.status);
        }

        const data = await response.json();
        const replyText = data.reply_text ?? data.output ?? 'Brak odpowiedzi.';
        addMessage(replyText, 'bot');
      } catch (error) {
        const systemMessages = chat.querySelectorAll('.system');
        if (systemMessages.length > 0) {
          systemMessages[systemMessages.length - 1].remove();
        }
        addMessage('Błąd połączenia z serwerem.', 'bot');
        console.error(error);
      } finally {
        setSendingState(false);
        textInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    textInput.addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
