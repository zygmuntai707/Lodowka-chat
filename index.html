<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Lodówki AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      padding: 16px;
      background: #2c3e50;
      color: white;
      text-align: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 10px;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #3498db;
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: white;
      color: black;
    }

    #inputBar {
      display: flex;
      padding: 10px;
      gap: 8px;
      background: white;
      border-top: 1px solid #ddd;
      position: sticky;
      bottom: 0;
    }

    #textInput {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      font-size: 16px;
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      color: white;
    }

    #sendBtn {
      background: #2ecc71;
    }

    #micBtn {
      background: #e67e22;
    }
  </style>
</head>

<body>

<header>Lodówki AI</header>

<div id="chat">
  <div class="message bot">Witaj. Powiedz co chcesz zrobić.</div>
  <div class="message user">Gdzie jest kurczak?</div>
  <div class="message bot">Poniżej lokalizacja produktu...</div>
</div>

<div id="inputBar">
  <button id="micBtn">🎤</button>
  <input id="textInput" placeholder="Napisz wiadomość..." />
  <button id="sendBtn">Wyślij</button>
</div>

</body>
</html>
